base_config: default_realvideo_ocr_nopromote_rawgate020_propagation.yaml

identity_propagation:
  enabled: true
  min_composite_score: 0.32
  min_score_margin: 0.03
  max_hops: 1
  allow_propagated_sources: false
  allow_partial_conflict_frames: true
  min_partial_frames: 1
  min_partial_fraction: 0.05
  min_source_confidence: 0.55
  min_team_confidence: 0.50
  max_temporal_gap: 650
  max_spatial_distance: 35.0
  min_appearance_similarity: 0.45
  strong_appearance_similarity: 0.68
  allow_temporal_overlap: true
  temporal_overlap_score: 0.10
  require_team_match: true
  require_jersey_or_strong_appearance: true
  conflict_buffer: 0
